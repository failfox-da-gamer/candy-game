<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍬 Конфетный кликер</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(145deg, #fbe9f0 0%, #f8dbe9 100%);
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        .game-container {
            max-width: 480px;
            width: 100%;
            background: rgba(255, 245, 248, 0.7);
            backdrop-filter: blur(4px);
            border-radius: 56px;
            padding: 28px 24px 36px;
            box-shadow: 0 20px 40px rgba(200, 120, 150, 0.25),
                        0 6px 12px rgba(0,0,0,0.05);
            border: 1px solid rgba(255, 255, 255, 0.6);
            transition: all 0.2s;
        }

        h1 {
            text-align: center;
            font-weight: 600;
            font-size: 2.2rem;
            margin: 0 0 8px 0;
            color: #5a3e4a;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        h1 span {
            background: #ffdce8;
            padding: 0 16px;
            border-radius: 80px;
            font-size: 1.8rem;
            line-height: 1.4;
        }

        .candy-counter {
            background: #ffeef4;
            border-radius: 60px;
            padding: 12px 20px;
            margin: 12px 0 20px 0;
            text-align: center;
            box-shadow: inset 0 2px 8px rgba(180, 80, 120, 0.08);
            border: 1px solid #ffd9e6;
        }

        .candy-counter span {
            font-size: 2.8rem;
            font-weight: 700;
            color: #602f44;
            letter-spacing: 2px;
        }
        .candy-counter small {
            font-size: 1.2rem;
            color: #87556b;
            margin-left: 6px;
        }

        .candy-button {
            background: radial-gradient(circle at 30% 30%, #ffb3c6, #f284a8);
            width: 200px;
            height: 200px;
            border-radius: 50%;
            margin: 16px auto 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 7rem;
            box-shadow: 0 16px 0 #a55373, 0 12px 30px rgba(180, 70, 110, 0.4);
            cursor: pointer;
            transition: all 0.07s ease;
            border: 4px solid #ffeef4;
            color: #fff6e5;
            text-shadow: 0 4px 0 #9f4b6b;
            transform: translateY(-4px);
            will-change: transform;
        }

        .candy-button:active {
            transform: translateY(8px);
            box-shadow: 0 6px 0 #a55373, 0 12px 30px rgba(180, 70, 110, 0.4);
        }

        .candy-button:disabled {
            opacity: 0.6;
            filter: grayscale(0.3);
            transform: translateY(4px);
            box-shadow: 0 8px 0 #7a4a5f, 0 12px 30px rgba(130, 70, 90, 0.3);
            pointer-events: none;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin: 24px 0 20px;
            background: #ffeef5;
            padding: 16px 14px;
            border-radius: 48px;
            border: 1px solid #ffdae7;
        }

        .stat-item {
            text-align: center;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 32px;
            padding: 8px 4px;
        }
        .stat-item .label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #8e6278;
        }
        .stat-item .value {
            font-size: 1.6rem;
            font-weight: 600;
            color: #452b38;
            line-height: 1.2;
        }

        .shop {
            background: #ffecf2;
            border-radius: 44px;
            padding: 18px 16px 14px;
            margin: 16px 0 8px;
            border: 1px solid #ffd4e3;
        }

        .shop h3 {
            margin: 0 0 14px 0;
            font-weight: 500;
            color: #513b45;
            letter-spacing: 0.3px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1.2rem;
            justify-content: center;
        }

        .upgrade-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .upgrade-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: white;
            padding: 12px 18px 12px 20px;
            border-radius: 60px;
            box-shadow: 0 2px 10px rgba(180, 90, 120, 0.08);
            border: 1px solid #ffdae7;
            transition: 0.15s;
        }

        .upgrade-item .info {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }
        .upgrade-item .info .name {
            font-weight: 600;
            color: #452b38;
            font-size: 1rem;
        }
        .upgrade-item .info .desc {
            font-size: 0.75rem;
            color: #956d7e;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .upgrade-item .price-badge {
            background: #ffdee9;
            padding: 6px 14px;
            border-radius: 40px;
            font-weight: 600;
            color: #6d3f53;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 4px;
            border: 1px solid #fccadc;
        }

        .upgrade-item button {
            background: #d68aa8;
            border: none;
            color: white;
            font-weight: 600;
            padding: 8px 22px;
            border-radius: 40px;
            font-size: 0.95rem;
            cursor: pointer;
            transition: 0.12s;
            box-shadow: 0 3px 0 #8b5370;
            border: 1px solid #f3bfd3;
            letter-spacing: 0.3px;
            min-width: 76px;
        }

        .upgrade-item button:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0 #8b5370;
        }

        .upgrade-item button:disabled {
            opacity: 0.45;
            transform: translateY(2px);
            box-shadow: 0 1px 0 #7a4a5f;
            pointer-events: none;
            background: #b690a3;
        }

        .reset-area {
            display: flex;
            justify-content: center;
            margin-top: 16px;
        }

        .reset-btn {
            background: transparent;
            border: 1px solid #dbb6c7;
            padding: 10px 28px;
            border-radius: 60px;
            font-size: 0.9rem;
            color: #7c5b6b;
            font-weight: 500;
            background: #fff3f8;
            cursor: pointer;
            transition: 0.1s;
            box-shadow: 0 2px 6px rgba(170, 100, 130, 0.1);
        }

        .reset-btn:active {
            transform: scale(0.95);
            background: #fce3ed;
        }

        .footer {
            font-size: 0.7rem;
            text-align: center;
            color: #b28b9c;
            margin-top: 16px;
            opacity: 0.7;
        }

        @media (max-width: 440px) {
            .game-container { padding: 20px 16px; }
            .candy-button { width: 160px; height: 160px; font-size: 5.5rem; }
        }
    </style>
</head>
<body>

<div class="game-container" role="main">
    <h1>
        🍭 Конфетный <span>клик</span>
    </h1>

    <div class="candy-counter">
        <span id="candyCount">0</span> <small>🍬</small>
    </div>

    <div class="candy-button" id="candyButton" role="button" tabindex="0" aria-label="Кликни на конфету">
        🍬
    </div>

    <div class="stats-grid">
        <div class="stat-item">
            <div class="label">За клик</div>
            <div class="value" id="perClickDisplay">1</div>
        </div>
        <div class="stat-item">
            <div class="label">Авто / сек</div>
            <div class="value" id="autoPerSec">0</div>
        </div>
    </div>

    <div class="shop">
        <h3>✨ Магазин улучшений</h3>
        <div class="upgrade-list" id="upgradeList">
            <!-- динамически через JS -->
        </div>
    </div>

    <div class="reset-area">
        <button class="reset-btn" id="resetGameBtn">🔄 Сбросить прогресс</button>
    </div>
    <div class="footer">тыкай 🍬 — покупай улучшения</div>
</div>

<script>
    (function() {
        // --- Игровое состояние ---
        let state = {
            candies: 0,
            clickPower: 1,
            autoPower: 0,
            // улучшения: [ { name, desc, basePrice, priceMultiplier, type, level, powerPerLevel, maxLevel } ]
            upgrades: [
                {
                    id: 'click',
                    name: '🍭 Сила клика',
                    desc: '+1 за клик',
                    basePrice: 10,
                    priceMultiplier: 1.6,
                    type: 'click',
                    level: 0,
                    powerPerLevel: 1,
                    maxLevel: 70
                },
                {
                    id: 'auto',
                    name: '⏳ Автокликер',
                    desc: '+1/сек',
                    basePrice: 25,
                    priceMultiplier: 1.8,
                    type: 'auto',
                    level: 0,
                    powerPerLevel: 1,
                    maxLevel: 60
                },
                {
                    id: 'click_bonus',
                    name: '🍬 Мощный клик',
                    desc: '+5 за клик',
                    basePrice: 80,
                    priceMultiplier: 2.0,
                    type: 'click',
                    level: 0,
                    powerPerLevel: 5,
                    maxLevel: 40
                },
                {
                    id: 'auto_bonus',
                    name: '⚡ Турбо-авто',
                    desc: '+5/сек',
                    basePrice: 200,
                    priceMultiplier: 2.2,
                    type: 'auto',
                    level: 0,
                    powerPerLevel: 5,
                    maxLevel: 30
                }
            ]
        };

        // --- DOM-ссылки ---
        const candySpan = document.getElementById('candyCount');
        const perClickDisplay = document.getElementById('perClickDisplay');
        const autoPerSecDisplay = document.getElementById('autoPerSec');
        const candyButton = document.getElementById('candyButton');
        const upgradeListEl = document.getElementById('upgradeList');
        const resetBtn = document.getElementById('resetGameBtn');

        // --- Вспомогательные функции ---
        function getClickPower() {
            let total = 0;
            state.upgrades.forEach(u => {
                if (u.type === 'click') {
                    total += u.level * u.powerPerLevel;
                }
            });
            // базовый 1, если нет улучшений
            return total > 0 ? total : 1;
        }

        function getAutoPower() {
            let total = 0;
            state.upgrades.forEach(u => {
                if (u.type === 'auto') {
                    total += u.level * u.powerPerLevel;
                }
            });
            return total;
        }

        function getUpgradePrice(upgrade) {
            // price = basePrice * (priceMultiplier ^ level)
            return Math.floor(upgrade.basePrice * Math.pow(upgrade.priceMultiplier, upgrade.level));
        }

        // --- Обновление UI ---
        function renderAll() {
            // Обновляем счётчик
            candySpan.textContent = Math.floor(state.candies);

            // Сила клика и авто
            const clickPow = getClickPower();
            const autoPow = getAutoPower();
            perClickDisplay.textContent = clickPow;
            autoPerSecDisplay.textContent = autoPow;

            // Рендерим улучшения
            renderUpgrades();

            // Сохраняем состояние в localStorage
            saveState();
        }

        function renderUpgrades() {
            let html = '';
            state.upgrades.forEach((upgrade, index) => {
                const price = getUpgradePrice(upgrade);
                const isMaxed = upgrade.level >= upgrade.maxLevel;
                const canAfford = state.candies >= price && !isMaxed;

                html += `
                    <div class="upgrade-item" data-index="${index}">
                        <div class="info">
                            <span class="name">${upgrade.name} (ур. ${upgrade.level})</span>
                            <span class="desc">
                                <span>${upgrade.desc}</span>
                                <span>💰 ${price}</span>
                            </span>
                        </div>
                        <button ${!canAfford ? 'disabled' : ''} data-index="${index}" class="buy-upgrade-btn">
                            ${isMaxed ? 'MAX' : 'Купить'}
                        </button>
                    </div>
                `;
            });
            upgradeListEl.innerHTML = html;

            // Вешаем обработчики на кнопки "Купить"
            document.querySelectorAll('.buy-upgrade-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const idx = parseInt(btn.dataset.index, 10);
                    if (!isNaN(idx)) {
                        buyUpgrade(idx);
                    }
                });
            });
        }

        // --- Логика покупки ---
        function buyUpgrade(index) {
            const upgrade = state.upgrades[index];
            if (!upgrade) return;

            // проверка на максимальный уровень
            if (upgrade.level >= upgrade.maxLevel) {
                return;
            }

            const price = getUpgradePrice(upgrade);
            if (state.candies < price) {
                return; // недостаточно конфет
            }

            // Списываем конфеты
            state.candies -= price;
            // Увеличиваем уровень
            upgrade.level += 1;

            // Пересчёт силы клика и авто происходит через геттеры
            renderAll();
        }

        // --- Клик по конфете ---
        function handleCandyClick() {
            const power = getClickPower();
            state.candies += power;
            renderAll();

            // Небольшая анимация (визуальный фидбек)
            candyButton.style.transform = 'scale(0.92)';
            setTimeout(() => {
                candyButton.style.transform = '';
            }, 90);
        }

        // --- Авто-тик (секунда) ---
        function autoTick() {
            const auto = getAutoPower();
            if (auto > 0) {
                state.candies += auto;
                renderAll();
            }
        }

        // --- Сохранение / загрузка ---
        function saveState() {
            try {
                const data = {
                    candies: state.candies,
                    upgrades: state.upgrades.map(u => ({
                        id: u.id,
                        level: u.level
                    }))
                };
                localStorage.setItem('candyClickerSave', JSON.stringify(data));
            } catch (e) {
                // игнорируем
            }
        }

        function loadState() {
            try {
                const raw = localStorage.getItem('candyClickerSave');
                if (!raw) return false;
                const data = JSON.parse(raw);
                if (typeof data.candies === 'number') {
                    state.candies = data.candies;
                }
                if (Array.isArray(data.upgrades)) {
                    data.upgrades.forEach(saved => {
                        const target = state.upgrades.find(u => u.id === saved.id);
                        if (target && typeof saved.level === 'number') {
                            target.level = Math.min(saved.level, target.maxLevel);
                        }
                    });
                }
                return true;
            } catch (e) {
                return false;
            }
        }

        // --- Сброс прогресса ---
        function resetGame() {
            if (confirm('Сбросить весь прогресс? Все конфеты и улучшения будут удалены.')) {
                // Сбрасываем уровни улучшений
                state.upgrades.forEach(u => u.level = 0);
                state.candies = 0;
                renderAll();
                localStorage.removeItem('candyClickerSave');
            }
        }

        // --- Инициализация ---
        function init() {
            // Загрузка сохранения
            const loaded = loadState();
            // Если не загрузилось, всё равно рендерим с дефолтными значениями
            renderAll();

            // Событие клика по конфете
            candyButton.addEventListener('click', handleCandyClick);

            // Сброс
            resetBtn.addEventListener('click', resetGame);

            // Авто-тик каждую секунду
            setInterval(autoTick, 1000);

            // Дополнительно: каждые 5 секунд сохраняем (на всякий случай)
            setInterval(saveState, 5000);

            // Сохраняем при закрытии/перезагрузке
            window.addEventListener('beforeunload', () => {
                saveState();
            });

            console.log('🍬 Конфетный кликер запущен!');
        }

        // Старт
        init();
    })();
</script>
</body>
</html>
